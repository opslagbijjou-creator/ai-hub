services:
  - type: web
    name: ai-hub-backend
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: WWEBJS_DATA_PATH
        value: /opt/render/project/src/.wwebjs_auth
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    disk:
      name: whatsapp-session-data
      mountPath: /opt/render/project/src
      sizeGB: 2
